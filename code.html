<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UV-K5 APRS Code Tool</title>
<style>
  :root {
    --bg: #edf0ef;
    --ink: #182024;
    --muted: #5a6a70;
    --line: #ccd4d2;
    --accent: #c97a0a;
    --accent-ink: #ffffff;
    --field-bg: #ffffff;
    --lcd-bg: #201d12;
    --lcd-frame: #35301e;
    --lcd-digit: #ffb020;
    --lcd-dim: #8a7a45;
    --warn: #a33f12;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131719;
      --ink: #e8ecec;
      --muted: #93a1a6;
      --line: #2c3438;
      --accent: #f0a020;
      --accent-ink: #131719;
      --field-bg: #1b2124;
      --warn: #ff8a50;
    }
  }
  :root[data-theme="light"] {
    --bg: #edf0ef; --ink: #182024; --muted: #5a6a70; --line: #ccd4d2;
    --accent: #c97a0a; --accent-ink: #ffffff; --field-bg: #ffffff; --warn: #a33f12;
  }
  :root[data-theme="dark"] {
    --bg: #131719; --ink: #e8ecec; --muted: #93a1a6; --line: #2c3438;
    --accent: #f0a020; --accent-ink: #131719; --field-bg: #1b2124; --warn: #ff8a50;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    margin: 0;
    padding: 2rem 1.25rem 3rem;
  }
  .wrap { max-width: 26rem; margin: 0 auto; display: flex; flex-direction: column; gap: 1.4rem; }
  .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .eyebrow {
    font: 600 0.72rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .langtoggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    flex: none;
  }
  .langtoggle button {
    border: 0;
    background: transparent;
    color: var(--muted);
    font: 700 0.72rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.08em;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
  }
  .langtoggle button[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink); }
  .langtoggle button:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; }
  h1 {
    font: 700 1.6rem/1.2 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: -0.01em;
    margin: 0.35rem 0 0;
    text-wrap: balance;
  }
  h2 {
    font: 700 0.85rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0;
    padding-top: 1.3rem;
    border-top: 1px solid var(--line);
  }
  .lede { color: var(--muted); margin: 0.5rem 0 0; }
  button#git {
    display: block;
    width: 100%;
    padding: 0.95rem 1rem;
    border: 0;
    border-radius: 6px;
    background: var(--accent);
    color: var(--accent-ink);
    font: 700 0.95rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button#git:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }
  button#git:disabled { opacity: 0.55; cursor: wait; }
  .lcd {
    background: var(--lcd-bg);
    border: 1px solid var(--lcd-frame);
    border-radius: 8px;
    padding: 1rem 1rem 0.9rem;
    display: none;
    flex-direction: column;
    gap: 0.55rem;
  }
  .lcd.on { display: flex; }
  .lcd .label {
    font: 600 0.68rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--lcd-dim);
  }
  .lcd .code {
    font: 700 clamp(1.3rem, 7vw, 1.8rem)/1.45 ui-monospace, "SF Mono", Menlo, monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
    color: var(--lcd-digit);
    word-spacing: 0.35em;
    user-select: all;
    -webkit-user-select: all;
    overflow-wrap: break-word;
  }
  .lcd .meta {
    font: 400 0.8rem/1.5 ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--lcd-dim);
    overflow-wrap: break-word;
  }
  .status { color: var(--muted); font-size: 0.9rem; min-height: 1.4em; margin: 0; }
  .status.err { color: var(--warn); }
  label.f {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    font: 600 0.72rem/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  label.f input, label.f textarea {
    font: 500 1.05rem/1.4 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.04em;
    color: var(--ink);
    background: var(--field-bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0.6rem 0.7rem;
    width: 100%;
    box-sizing: border-box;
    text-transform: uppercase;
  }
  label.f input:focus-visible, label.f textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  textarea { resize: none; }
  ol.steps {
    margin: 0;
    padding: 1.25rem 0 0 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    color: var(--ink);
    font-size: 0.92rem;
    border-top: 1px solid var(--line);
  }
  ol.steps li::marker {
    font: 700 0.85rem ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--accent);
  }
  ol.steps b { font-weight: 650; }
  .fine {
    color: var(--muted);
    font-size: 0.78rem;
    border-top: 1px solid var(--line);
    padding-top: 1rem;
    margin: 0;
  }
  @media (prefers-reduced-motion: no-preference) {
    .lcd.on { animation: in 220ms ease-out; }
    @keyframes in { from { opacity: 0; transform: translateY(4px); } }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="eyebrow" id="t-eyebrow">UV-K5 &middot; APRS FIELD TOOL</div>
    <div class="langtoggle" role="group" aria-label="Language">
      <button type="button" data-lang="tr" aria-pressed="false">TR</button>
      <button type="button" data-lang="en" aria-pressed="true">EN</button>
    </div>
  </div>

  <header>
    <h1 id="t-title">Code Tool</h1>
    <p class="lede" id="t-lede">Turns your location, callsign and message into number codes you enter on the radio keypad.</p>
  </header>

  <h2 id="t-h2loc">Location &rarr; 73 Loc</h2>
  <button id="git" type="button">Get Location</button>
  <p class="status" id="durum" role="status"></p>
  <section class="lcd" id="panel" aria-live="polite">
    <div class="label" id="t-loclabel">15 digits &middot; Menu 73 Loc</div>
    <div class="code" id="kod"></div>
    <div class="meta" id="meta"></div>
  </section>

  <h2 id="t-h2text">Text &rarr; Call / MsgTo / Msg</h2>
  <label class="f" id="t-calllabel">Callsign (Call / MsgTo)
    <input id="cagri" maxlength="9" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="TB1AAW">
  </label>
  <section class="lcd" id="cagriPanel">
    <div class="label t-pair">Each character = 2 digits</div>
    <div class="code" id="cagriKod"></div>
    <div class="meta" id="cagriMeta"></div>
  </section>

  <label class="f" id="t-msglabel">Message (Msg / Cmnt) &mdash; up to 30 characters
    <textarea id="mesaj" maxlength="30" rows="2" autocomplete="off" spellcheck="false" placeholder="QSL 73"></textarea>
  </label>
  <section class="lcd" id="mesajPanel">
    <div class="label t-pair">Each character = 2 digits</div>
    <div class="code" id="mesajKod"></div>
    <div class="meta" id="mesajMeta"></div>
  </section>

  <ol class="steps" id="t-steps"></ol>

  <p class="fine" id="t-fine"></p>
</div>

<script>
  var CS = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ -./?!@:,'";

  // ---- bilingual strings ----
  var T = {
    tr: {
      html: "tr",
      eyebrow: "UV-K5 &middot; APRS SAHA ARACI",
      title: "Kod Aracı",
      lede: "Konum, çağrı işareti ve mesajı telsizin tuş takımıyla girilecek rakam kodlarına çevirir.",
      h2loc: "Konum &rarr; 73 Loc",
      getBtn: "Konumu Al",
      refreshBtn: "Konumu Yenile",
      retryBtn: "Tekrar Dene",
      searchingBtn: "Aranıyor…",
      loclabel: "15 hane &middot; Menü 73 Loc",
      h2text: "Metin &rarr; Call / MsgTo / Msg",
      calllabel: "Çağrı işareti (Call / MsgTo)",
      msglabel: "Mesaj (Msg / Cmnt) &mdash; en çok 30 karakter",
      pair: "Her karakter = 2 hane",
      steps: [
        "Kodu bu sayfadan üretin.",
        "Telsizde ilgili menü alanına MENU ile girin.",
        "Rakamları soldan sağa girin &mdash; metin alanlarında her <b>2 rakam</b> bir karaktere dönüşür, ekranda anında görürsünüz.",
        "<b>EXIT</b> = geri sil &middot; son karakterde <b>MENU</b> = kaydet."
      ],
      fine: "Karakter tablosu: 00&ndash;09 rakamlar, 10&ndash;35 A&ndash;Z, 36 boşluk, 37&ndash;45 noktalama (-./?!@:,'). Konum kodunun son hanesi kontrol hanesidir; hatalı kod telsizce reddedilir. Konum çözünürlüğü ~11&nbsp;m.",
      waiting: "GPS bekleniyor…",
      outOfRange: "Konum aralık dışında görünüyor, tekrar deneyin.",
      lowAcc: function (a) { return "GPS hassasiyeti düşük (±" + a + " m). Açık alanda yenileyin."; },
      denied: "Konum izni reddedildi. Tarayıcı ayarlarından bu sayfaya konum izni verin.",
      timeout: "Konum alma zaman aşımına uğradı. Açık alanda tekrar deneyin.",
      failed: "Konum alınamadı. GPS açık mı?",
      noGeo: "Bu tarayıcı konum servisini desteklemiyor.",
      skipped: "  (desteklenmeyen karakterler atlandı)"
    },
    en: {
      html: "en",
      eyebrow: "UV-K5 &middot; APRS FIELD TOOL",
      title: "Code Tool",
      lede: "Turns your location, callsign and message into number codes you enter on the radio keypad.",
      h2loc: "Location &rarr; 73 Loc",
      getBtn: "Get Location",
      refreshBtn: "Refresh Location",
      retryBtn: "Try Again",
      searchingBtn: "Locating…",
      loclabel: "15 digits &middot; Menu 73 Loc",
      h2text: "Text &rarr; Call / MsgTo / Msg",
      calllabel: "Callsign (Call / MsgTo)",
      msglabel: "Message (Msg / Cmnt) &mdash; up to 30 characters",
      pair: "Each character = 2 digits",
      steps: [
        "Generate the code on this page.",
        "On the radio, open the matching menu field with MENU.",
        "Enter the digits left to right &mdash; in text fields every <b>2 digits</b> become one character, shown instantly on screen.",
        "<b>EXIT</b> = backspace &middot; on the last character <b>MENU</b> = save."
      ],
      fine: "Character table: 00&ndash;09 digits, 10&ndash;35 A&ndash;Z, 36 space, 37&ndash;45 punctuation (-./?!@:,'). The location code's last digit is a checksum; a wrong code is rejected by the radio. Location resolution ~11&nbsp;m.",
      waiting: "Waiting for GPS…",
      outOfRange: "Location seems out of range, try again.",
      lowAcc: function (a) { return "Low GPS accuracy (±" + a + " m). Refresh outdoors."; },
      denied: "Location permission denied. Allow location for this page in your browser settings.",
      timeout: "Location request timed out. Try again outdoors.",
      failed: "Could not get location. Is GPS on?",
      noGeo: "This browser does not support geolocation.",
      skipped: "  (unsupported characters skipped)"
    }
  };

  var LANG = "en";
  var lastState = null;  // remember button state so language switch keeps it

  function applyLang() {
    var d = T[LANG];
    document.documentElement.lang = d.html;
    document.getElementById("t-eyebrow").innerHTML = d.eyebrow;
    document.getElementById("t-title").textContent = d.title;
    document.getElementById("t-lede").textContent = d.lede;
    document.getElementById("t-h2loc").innerHTML = d.h2loc;
    document.getElementById("t-loclabel").innerHTML = d.loclabel;
    document.getElementById("t-h2text").innerHTML = d.h2text;
    // labels contain an input/textarea child; set only the leading text node
    setLabelText("t-calllabel", d.calllabel);
    setLabelText("t-msglabel", d.msglabel);
    var pairs = document.querySelectorAll(".t-pair");
    for (var i = 0; i < pairs.length; i++) pairs[i].textContent = d.pair;
    var ol = document.getElementById("t-steps");
    ol.innerHTML = "";
    for (var j = 0; j < d.steps.length; j++) {
      var li = document.createElement("li");
      li.innerHTML = d.steps[j];
      ol.appendChild(li);
    }
    document.getElementById("t-fine").innerHTML = d.fine;
    // button label reflects current state
    if (!btn.disabled)
      btn.textContent = (lastState === "done") ? d.refreshBtn
                      : (lastState === "err")  ? d.retryBtn
                      : d.getBtn;
    document.title = d.title + " – UV-K5 APRS";
    var btns = document.querySelectorAll(".langtoggle button");
    for (var k = 0; k < btns.length; k++)
      btns[k].setAttribute("aria-pressed", btns[k].dataset.lang === LANG ? "true" : "false");
  }

  function setLabelText(id, text) {
    var el = document.getElementById(id);
    // first child is the text node before the input/textarea
    if (el.firstChild && el.firstChild.nodeType === 3)
      el.firstChild.textContent = text + " ";
    else
      el.insertBefore(document.createTextNode(text + " "), el.firstChild);
  }

  var btn = document.getElementById('git');
  var durum = document.getElementById('durum');
  var panel = document.getElementById('panel');
  var kodEl = document.getElementById('kod');
  var metaEl = document.getElementById('meta');

  function kodYap(lat, lon) {
    var la = Math.round((lat + 90) * 10000);
    var lo = Math.round((lon + 180) * 10000);
    if (la < 0 || la > 1800000 || lo < 0 || lo > 3600000) return null;
    var ds = String(la).padStart(7, '0') + String(lo).padStart(7, '0');
    var sum = 0;
    for (var i = 0; i < 14; i++) sum += (i + 1) * Number(ds[i]);
    return ds + String(sum % 10);
  }

  function goster(pos) {
    var d = T[LANG];
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;
    var acc = Math.round(pos.coords.accuracy);
    var kod = kodYap(lat, lon);
    btn.disabled = false;
    lastState = "done";
    btn.textContent = d.refreshBtn;
    if (!kod) {
      durum.className = 'status err';
      durum.textContent = d.outOfRange;
      return;
    }
    durum.className = 'status';
    durum.textContent = '';
    kodEl.textContent = kod.slice(0, 5) + ' ' + kod.slice(5, 10) + ' ' + kod.slice(10, 15);
    metaEl.textContent = lat.toFixed(4) + '°  ' + lon.toFixed(4) + '°  (±' + acc + ' m)';
    if (acc > 100) {
      durum.className = 'status err';
      durum.textContent = d.lowAcc(acc);
    }
    panel.classList.add('on');
  }

  function hata(e) {
    var d = T[LANG];
    btn.disabled = false;
    lastState = "err";
    btn.textContent = d.retryBtn;
    durum.className = 'status err';
    if (e && e.code === 1)
      durum.textContent = d.denied;
    else if (e && e.code === 3)
      durum.textContent = d.timeout;
    else
      durum.textContent = d.failed;
  }

  btn.addEventListener('click', function () {
    var d = T[LANG];
    if (!navigator.geolocation) {
      durum.className = 'status err';
      durum.textContent = d.noGeo;
      return;
    }
    btn.disabled = true;
    btn.textContent = d.searchingBtn;
    durum.className = 'status';
    durum.textContent = d.waiting;
    navigator.geolocation.getCurrentPosition(goster, hata, {
      enableHighAccuracy: true,
      timeout: 20000,
      maximumAge: 0
    });
  });

  function metinKodla(girisId, panelId, kodId, metaId) {
    var giris = document.getElementById(girisId);
    var pan = document.getElementById(panelId);
    var kodOut = document.getElementById(kodId);
    var metaOut = document.getElementById(metaId);
    giris.addEventListener('input', function () {
      var t = giris.value.toUpperCase();
      var pairs = [];
      var temiz = '';
      var atlandi = false;
      for (var ch of t) {
        var i = CS.indexOf(ch);
        if (i < 0) { atlandi = true; continue; }
        pairs.push(String(i).padStart(2, '0'));
        temiz += ch;
      }
      if (pairs.length === 0) { pan.classList.remove('on'); return; }
      kodOut.textContent = pairs.join(' ');
      metaOut.textContent = temiz + (atlandi ? T[LANG].skipped : '');
      pan.classList.add('on');
    });
  }
  metinKodla('cagri', 'cagriPanel', 'cagriKod', 'cagriMeta');
  metinKodla('mesaj', 'mesajPanel', 'mesajKod', 'mesajMeta');

  // language toggle
  var langBtns = document.querySelectorAll(".langtoggle button");
  for (var i = 0; i < langBtns.length; i++) {
    langBtns[i].addEventListener("click", function () {
      LANG = this.dataset.lang;
      applyLang();
    });
  }

  // default to the browser language if it's Turkish, else English
  if ((navigator.language || "").toLowerCase().indexOf("tr") === 0) LANG = "tr";
  applyLang();
</script>
</body>
</html>
