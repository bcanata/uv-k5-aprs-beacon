<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UV-K5 APRS · TA1JS</title>
<style>
  :root {
    --bg:#edf0ef; --ink:#182024; --muted:#5a6a70; --line:#ccd4d2;
    --accent:#c97a0a; --accent-ink:#fff; --ok:#2f7d4f; --warn:#a33f12;
    --field-bg:#fff; --card:#f6f8f7;
    --lcd-bg:#201d12; --lcd-frame:#35301e; --lcd-digit:#ffb020; --lcd-dim:#8a7a45;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#131719; --ink:#e8ecec; --muted:#93a1a6; --line:#2c3438;
            --accent:#f0a020; --accent-ink:#131719; --ok:#5fd08a; --warn:#ff8a50;
            --field-bg:#1b2124; --card:#171c1e; }
  }
  :root[data-theme="light"]{--bg:#edf0ef;--ink:#182024;--muted:#5a6a70;--line:#ccd4d2;--accent:#c97a0a;--accent-ink:#fff;--ok:#2f7d4f;--warn:#a33f12;--field-bg:#fff;--card:#f6f8f7;}
  :root[data-theme="dark"]{--bg:#131719;--ink:#e8ecec;--muted:#93a1a6;--line:#2c3438;--accent:#f0a020;--accent-ink:#131719;--ok:#5fd08a;--warn:#ff8a50;--field-bg:#1b2124;--card:#171c1e;}
  *{box-sizing:border-box;}
  body{background:var(--bg);color:var(--ink);margin:0;padding:0 1.25rem 4rem;
       font:16px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif;}
  .wrap{max-width:32rem;margin:0 auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:1rem 0 .5rem;}
  .langtoggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;flex:none;}
  .langtoggle button{border:0;background:transparent;color:var(--muted);
      font:700 .72rem/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;padding:.4rem .6rem;cursor:pointer;}
  .langtoggle button[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink);}
  .langtoggle button:focus-visible{outline:2px solid var(--ink);outline-offset:-2px;}
  nav.tabs{display:flex;gap:.4rem;padding:.4rem 0 1rem;border-bottom:1px solid var(--line);margin-bottom:1.4rem;
      font:600 .74rem/1 ui-monospace,Menlo,monospace;letter-spacing:.06em;text-transform:uppercase;flex-wrap:wrap;}
  nav.tabs a{color:var(--muted);text-decoration:none;padding:.45rem .7rem;border-radius:6px;}
  nav.tabs a.active{background:var(--accent);color:var(--accent-ink);}
  nav.tabs a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .view{display:none;}
  .view.active{display:block;}
  .eyebrow{font:600 .72rem/1 ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  h1{font:700 1.7rem/1.2 ui-monospace,Menlo,monospace;letter-spacing:-.01em;margin:.35rem 0 .3rem;}
  .lede{color:var(--muted);margin:0 0 1rem;}
  .note{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:.8rem .9rem;margin:1rem 0;font-size:.9rem;}
  .note.warn{border-color:var(--warn);}
  .note b{font-weight:650;}
  ol.wiz{list-style:none;counter-reset:step;padding:0;margin:1.5rem 0 0;display:flex;flex-direction:column;gap:1rem;}
  li.step{counter-increment:step;border:1px solid var(--line);border-radius:10px;padding:1rem 1rem 1.1rem;
          background:var(--card);position:relative;opacity:.5;transition:opacity .2s;}
  li.step.active,li.step.done{opacity:1;}
  li.step h2{font:700 1rem/1.25 ui-monospace,Menlo,monospace;margin:0 0 .3rem;display:flex;gap:.55rem;align-items:baseline;}
  li.step h2::before{content:counter(step);flex:none;width:1.5rem;height:1.5rem;border-radius:50%;
      background:var(--accent);color:var(--accent-ink);font-size:.8rem;display:grid;place-items:center;}
  li.step.done h2::before{content:"\2713";background:var(--ok);color:#04120a;}
  li.step p{margin:.4rem 0;font-size:.92rem;}
  button.act{display:inline-block;margin-top:.6rem;padding:.7rem 1rem;border:0;border-radius:6px;
      background:var(--accent);color:var(--accent-ink);cursor:pointer;
      font:700 .85rem/1 ui-monospace,Menlo,monospace;letter-spacing:.06em;text-transform:uppercase;}
  button.act.dark{background:var(--ink);color:var(--bg);}
  button.act:disabled{opacity:.4;cursor:not-allowed;}
  button.act:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .status{min-height:1.3em;margin:.5rem 0 0;font-size:.88rem;color:var(--muted);}
  .status.err{color:var(--warn);} .status.ok{color:var(--ok);}
  .bar{height:8px;border-radius:4px;background:var(--line);overflow:hidden;margin:.6rem 0 0;display:none;}
  .bar.on{display:block;} .bar > i{display:block;height:100%;width:0;background:var(--accent);transition:width .1s;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.5rem 0;}
  label.f{display:flex;flex-direction:column;gap:.3rem;font:600 .68rem/1 ui-monospace,Menlo,monospace;
          letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  label.f.wide{grid-column:1 / -1;}
  input,select,textarea{font:500 1rem ui-monospace,Menlo,monospace;color:var(--ink);background:var(--field-bg);
      border:1px solid var(--line);border-radius:6px;padding:.5rem .6rem;width:100%;text-transform:uppercase;}
  input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  textarea{resize:none;}
  textarea.raw{width:100%;min-height:4em;font:400 .78rem/1.4 ui-monospace,Menlo,monospace;color:var(--warn);
      background:transparent;border:1px solid var(--line);border-radius:6px;padding:.5rem;display:none;margin-top:.5rem;text-transform:none;}
  a.pill{display:inline-block;margin-top:.6rem;padding:.7rem 1rem;border-radius:6px;background:var(--ok);color:#04120a;
      text-decoration:none;font:700 .85rem/1 ui-monospace,Menlo,monospace;letter-spacing:.06em;text-transform:uppercase;}
  a.skip{display:inline-block;margin-top:.55rem;font:600 .72rem/1 ui-monospace,Menlo,monospace;letter-spacing:.05em;
      color:var(--muted);text-decoration:none;border-bottom:1px dashed var(--line);padding-bottom:1px;}
  a.skip:hover{color:var(--accent);border-color:var(--accent);}
  a.skip::after{content:" \2192";}
  .fine{color:var(--muted);font-size:.8rem;margin-top:1.5rem;border-top:1px solid var(--line);padding-top:1rem;}
  code{font-family:ui-monospace,Menlo,monospace;}

  /* beacon + code shared LCD panels & big buttons */
  button.big{display:block;width:100%;padding:.95rem 1rem;border:0;border-radius:6px;
      font:700 .95rem/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:1rem;}
  button.big:first-of-type{margin-top:0;}
  button.big:disabled{opacity:.45;cursor:not-allowed;}
  button.big:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  #bxConnect{background:var(--ink);color:var(--bg);}
  #bxConnect.connected{background:var(--ok);color:#04120a;}
  #bxBeacon{background:var(--accent);color:var(--accent-ink);}
  #bxTrack{background:var(--ok);color:#04120a;}
  .lcd{background:var(--lcd-bg);border:1px solid var(--lcd-frame);border-radius:8px;
       padding:1rem;display:none;flex-direction:column;gap:.5rem;margin-top:1rem;}
  .lcd.on{display:flex;}
  .lcd .label{font:600 .66rem/1 ui-monospace,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--lcd-dim);}
  .lcd .big{font:700 clamp(1.4rem,7vw,1.9rem)/1.3 ui-monospace,Menlo,monospace;color:var(--lcd-digit);font-variant-numeric:tabular-nums;}
  .lcd .codeout{font:700 clamp(1.3rem,7vw,1.8rem)/1.45 ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums;
      letter-spacing:.06em;color:var(--lcd-digit);word-spacing:.35em;user-select:all;-webkit-user-select:all;overflow-wrap:break-word;}
  .lcd .meta{font:400 .8rem/1.5 ui-monospace,Menlo,monospace;color:var(--lcd-dim);overflow-wrap:break-word;}
  h2.sec{font:700 .85rem/1 ui-monospace,Menlo,monospace;letter-spacing:.12em;text-transform:uppercase;
      margin:1.6rem 0 0;padding-top:1.3rem;border-top:1px solid var(--line);}
  ol.steps{margin:1rem 0 0;padding:0 0 0 1.4rem;display:flex;flex-direction:column;gap:.5rem;color:var(--ink);font-size:.92rem;}
  ol.steps li::marker{font:700 .85rem ui-monospace,Menlo,monospace;color:var(--accent);}
  ol.steps b{font-weight:650;}
  .rowfields{display:flex;flex-direction:column;gap:.7rem;border-top:1px solid var(--line);padding-top:1.1rem;margin-top:1.1rem;}
  .inlinelbl{font:600 .72rem/1 ui-monospace,Menlo,monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  input.tiny{width:4.5rem;margin:0 .4rem;display:inline;}

  /* ---- radio control panel ---- */
  .rc-lcd{background:var(--lcd-bg);border:1px solid var(--lcd-frame);border-radius:10px;padding:.8rem;display:flex;justify-content:center;margin-top:1rem;}
  #rcScreen{width:100%;max-width:24rem;image-rendering:pixelated;aspect-ratio:128/64;background:#0d0b05;border-radius:4px;}
  .rc-state{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem .8rem;margin:.9rem 0;font:600 .78rem/1.3 ui-monospace,Menlo,monospace;color:var(--muted);}
  .rc-state b{color:var(--ink);font-weight:700;}
  .rc-state .tx{color:var(--warn);}
  .rc-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:1rem;}
  .rc-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.5rem;}
  .rc-side{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-top:.5rem;}
  button.rk{padding:.85rem .3rem;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);
      font:700 1rem/1 ui-monospace,Menlo,monospace;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;}
  button.rk:active{background:var(--accent);color:var(--accent-ink);transform:translateY(1px);}
  button.rk .sub{display:block;font:600 .52rem/1.2 ui-monospace,Menlo,monospace;color:var(--muted);letter-spacing:.05em;margin-top:.15rem;}
  button.rk:active .sub{color:var(--accent-ink);}
  button.rk.wide{grid-column:span 1;}
  #rcConnect,#chConnect,#seConnect{background:var(--ink);color:var(--bg);}
  #rcConnect.connected,#chConnect.connected,#seConnect.connected{background:var(--ok);color:#04120a;}
  .selabel{}

  /* ---- APRS monitor + chat ---- */
  .chat{border:1px solid var(--line);border-radius:8px;background:var(--card);height:38vh;overflow-y:auto;
        padding:.8rem;display:flex;flex-direction:column;gap:.45rem;margin-top:.8rem;}
  .bub{max-width:82%;padding:.45rem .7rem;border-radius:11px;font-size:.86rem;line-height:1.35;word-break:break-word;}
  .bub .who{display:block;font:600 .58rem/1 ui-monospace,Menlo,monospace;letter-spacing:.04em;opacity:.7;margin-bottom:.2rem;}
  .bub .tm{display:block;font:400 .55rem/1 ui-monospace,Menlo,monospace;opacity:.5;margin-top:.25rem;text-align:right;}
  .bub.in{align-self:flex-start;background:var(--field-bg);border:1px solid var(--line);}
  .bub.out{align-self:flex-end;background:var(--accent);color:var(--accent-ink);}
  .chat .empty{margin:auto;color:var(--muted);font-size:.85rem;}
  .compose{display:flex;gap:.5rem;margin-top:.7rem;flex-wrap:wrap;}
  .compose input{font:500 .95rem ui-monospace,Menlo,monospace;color:var(--ink);background:var(--field-bg);border:1px solid var(--line);border-radius:6px;padding:.5rem .6rem;}
  .compose input#amTo{flex:0 0 7rem;text-transform:uppercase;}
  .compose input#amText{flex:1;min-width:9rem;text-transform:none;}
  .compose button.act{margin-top:0;flex:0 0 auto;}
  .loglist{border:1px solid var(--line);border-radius:8px;max-height:40vh;overflow-y:auto;margin-top:.8rem;
           font:500 .78rem/1.4 ui-monospace,Menlo,monospace;}
  .loglist .row{padding:.4rem .6rem;border-bottom:1px solid var(--line);display:flex;gap:.6rem;}
  .loglist .row .tm{color:var(--muted);flex:0 0 auto;font-size:.68rem;}
  .loglist .row .tx{word-break:break-word;}
  .loglist .empty{padding:.9rem;color:var(--muted);}
  .clearlink{display:inline-block;margin-top:.55rem;font:600 .68rem/1 ui-monospace,Menlo,monospace;letter-spacing:.04em;
             color:var(--muted);background:none;border:0;cursor:pointer;text-decoration:underline;}
  .clearlink:hover{color:var(--warn);}
  #rcConnect.connected{background:var(--ok);color:#04120a;}
  #rcPtt{background:var(--warn);color:#fff;touch-action:none;}
  #rcPtt.tx{background:#d11;box-shadow:0 0 0 3px rgba(209,17,17,.3);}
  .rc-tx{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-top:1rem;}
  .rc-tx label{display:flex;flex-direction:column;gap:.3rem;font:600 .64rem/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

  /* ---- channels editor ---- */
  .ch-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem;}
  .ch-actions .act{flex:1;min-width:9rem;margin-top:0;text-align:center;}
  .ch-scroll{margin-top:1rem;border:1px solid var(--line);border-radius:8px;overflow:auto;max-height:62vh;}
  table.ch{width:100%;border-collapse:collapse;font:500 .8rem/1.25 ui-monospace,Menlo,monospace;}
  table.ch th{position:sticky;top:0;background:var(--card);text-align:left;color:var(--muted);font-size:.62rem;
      letter-spacing:.07em;text-transform:uppercase;padding:.5rem .5rem;border-bottom:1px solid var(--line);}
  table.ch td{padding:.5rem .5rem;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.ch tbody tr{cursor:pointer;}
  table.ch tbody tr:hover td{background:var(--card);}
  table.ch .num{color:var(--muted);}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:1rem;z-index:50;}
  .modal.on{display:flex;}
  .modal .box{background:var(--bg);border:1px solid var(--line);border-radius:12px;max-width:27rem;width:100%;max-height:92vh;overflow:auto;padding:1.2rem 1.2rem 1.3rem;}
  .modal h3{font:700 1.05rem/1.2 ui-monospace,Menlo,monospace;margin:0 0 .9rem;}
  .modal .row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem;}
  .modal label{display:flex;flex-direction:column;gap:.25rem;font:600 .6rem/1.1 ui-monospace,Menlo,monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .modal label.wide{grid-column:1 / -1;}
  .modal .btns{display:flex;gap:.5rem;margin-top:1.1rem;flex-wrap:wrap;}
  .modal .btns .act{margin-top:0;flex:1;text-align:center;}
  .modal .del{background:var(--warn);color:#fff;}

  /* ---- EEPROM hex editor ---- */
  .hexbar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-top:1rem;}
  .hexbar .act{margin-top:0;}
  .hexjump{display:flex;align-items:center;gap:.4rem;font:600 .66rem/1 ui-monospace,Menlo,monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .hexjump input{width:6rem;}
  .hexwrap{margin-top:1rem;border:1px solid var(--line);border-radius:8px;overflow:auto;max-height:64vh;}
  table.hex{border-collapse:collapse;font:500 .72rem/1.35 ui-monospace,Menlo,monospace;}
  table.hex td{padding:.12rem .4rem;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.hex td.ad{color:var(--muted);user-select:none;position:sticky;left:0;background:var(--bg);}
  table.hex input.hx{width:24rem;font:500 .72rem/1.35 ui-monospace,Menlo,monospace;color:var(--ink);background:transparent;
      border:1px solid transparent;border-radius:4px;padding:.1rem .35rem;text-transform:uppercase;letter-spacing:.03em;}
  table.hex input.hx:focus{border-color:var(--accent);background:var(--field-bg);outline:none;}
  table.hex input.hx.dirty{color:var(--accent);font-weight:700;}
  table.hex input.hx.bad{border-color:var(--warn);color:var(--warn);}
  table.hex tr.calib td.ad{color:var(--warn);}
  table.hex td.as{color:var(--muted);letter-spacing:.05em;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="eyebrow" data-i18n="brand.eyebrow">Quansheng UV-K5 · APRS Edition</div>
    <div class="langtoggle" role="group" aria-label="Language">
      <button type="button" data-lang="tr" aria-pressed="false">TR</button>
      <button type="button" data-lang="en" aria-pressed="true">EN</button>
    </div>
  </div>
  <div style="font:600 .6rem/1 ui-monospace,Menlo,monospace;letter-spacing:.1em;color:var(--muted);text-align:right;margin:-.3rem 0 .3rem">build b10</div>

  <nav class="tabs">
    <a id="tab-install" href="#install" data-i18n="nav.install">Install</a>
    <a id="tab-beacon"  href="#beacon"  data-i18n="nav.beacon">Web Beacon</a>
    <a id="tab-code"    href="#code"    data-i18n="nav.code">Codes</a>
    <a id="tab-control" href="#control" data-i18n="nav.control">Control</a>
    <a id="tab-channels" href="#channels" data-i18n="nav.channels">Channels</a>
    <a id="tab-settings" href="#settings" data-i18n="nav.settings">Settings</a>
    <a id="tab-aprs" href="#aprs" data-i18n="nav.aprs">APRS</a>
  </nav>

  <!-- =============================== INSTALL =============================== -->
  <section class="view" id="view-install">
    <h1 data-i18n="install.h1">Firmware Installer</h1>
    <p class="lede" data-i18n="install.lede"></p>

    <div class="note warn" data-i18n-html="install.licnote"></div>
    <div class="note" id="envNote"></div>

    <ol class="wiz" id="wiz">
      <li class="step" id="s1">
        <h2 data-i18n="install.s1.h"></h2>
        <p data-i18n-html="install.s1.p"></p>
        <button class="act dark" id="btnConnect" data-i18n="install.s1.btn"></button>
        <p class="status" id="stConnect"></p>
        <textarea class="raw" id="raw" readonly></textarea>
      </li>

      <li class="step" id="s2">
        <h2 data-i18n="install.s2.h"></h2>
        <p data-i18n-html="install.s2.p"></p>
        <button class="act" id="btnBackup" disabled data-i18n="install.s2.btn"></button>
        <div class="bar" id="barBackup"><i></i></div>
        <p class="status" id="stBackup"></p>
        <a href="#" class="skip" id="skip2" data-i18n="install.skip"></a>
      </li>

      <li class="step" id="s3">
        <h2 data-i18n="install.s3.h"></h2>
        <p data-i18n-html="install.s3.p"></p>
        <button class="act" id="btnWipe" disabled data-i18n="install.s3.btn"></button>
        <div class="bar" id="barWipe"><i></i></div>
        <p class="status" id="stWipe"></p>
        <a href="#" class="skip" id="skip3" data-i18n="install.skip"></a>
      </li>

      <li class="step" id="s4">
        <h2 data-i18n="install.s4.h"></h2>
        <p data-i18n-html="install.s4.p"></p>
        <button class="act" id="btnFlashMode" disabled data-i18n="install.s4.btn"></button>
        <p class="status" id="stFlashMode"></p>
        <a href="#" class="skip" id="skip4" data-i18n="install.skip"></a>
      </li>

      <li class="step" id="s5">
        <h2 data-i18n="install.s5.h"></h2>
        <p><span data-i18n="install.s5.p"></span> <span id="flashDesktopOnly" style="display:none" data-i18n-html="install.s5.desktoponly"></span></p>
        <button class="act" id="btnFlash" disabled data-i18n="install.s5.btn"></button>
        <div class="bar" id="barFlash"><i></i></div>
        <p class="status" id="stFlash"></p>
        <a href="#" class="skip" id="skip5" data-i18n="install.skip"></a>
      </li>

      <li class="step" id="s6">
        <h2 data-i18n="install.s6.h"></h2>
        <p data-i18n="install.s6.p"></p>
        <div class="grid">
          <label class="f"><span data-i18n="install.f.call"></span><input id="call" maxlength="6" placeholder="TA1ABC" autocomplete="off" spellcheck="false"></label>
          <label class="f"><span data-i18n="install.f.ssid"></span><select id="ssid"></select></label>
          <label class="f wide"><span data-i18n="install.f.msgto"></span><input id="msgto" maxlength="9" placeholder="TA1XYZ-7" autocomplete="off" spellcheck="false"></label>
          <label class="f"><span data-i18n="install.f.intv"></span><select id="intv"></select></label>
          <label class="f"><span data-i18n="install.f.aprson"></span><select id="aprson"></select></label>
          <label class="f wide"><span data-i18n="install.f.pos"></span><input id="pos" readonly></label>
        </div>
        <button class="act dark" id="btnGps" data-i18n="install.s6.gps"></button>
        <button class="act" id="btnSave" disabled data-i18n="install.s6.save"></button>
        <p class="status" id="stSave"></p>
        <a href="#" class="skip" id="skip6" data-i18n="install.skip"></a>
      </li>

      <li class="step" id="s7">
        <h2 data-i18n="install.s7.h"></h2>
        <p data-i18n-html="install.s7.p"></p>
        <p data-i18n-html="install.s7.beacontitle"></p>
        <a class="pill" href="#beacon" data-i18n="install.s7.beaconbtn"></a>
        <p style="margin-top:1rem" data-i18n-html="install.s7.codeintro"></p>

/* ======================= i18n core ======================= */
var LANG = (navigator.language || "").toLowerCase().indexOf("tr") === 0 ? "tr" : "en";
var LANG_HOOKS = [];
function onLang(fn){ LANG_HOOKS.push(fn); }
function D(){ return T[LANG]; }
function dict(path){
  var o = T[LANG], ks = path.split(".");
  for (var i = 0; i < ks.length && o != null; i++) o = o[ks[i]];
  return o;
}
function $(id){ return document.getElementById(id); }

function applyLang(){
  document.documentElement.lang = LANG;
  var els = document.querySelectorAll("[data-i18n]");
  for (var i = 0; i < els.length; i++){ var v = dict(els[i].getAttribute("data-i18n")); if (v != null) els[i].textContent = v; }
  var hels = document.querySelectorAll("[data-i18n-html]");
  for (var j = 0; j < hels.length; j++){ var h = dict(hels[j].getAttribute("data-i18n-html")); if (h != null) hels[j].innerHTML = h; }
  var lb = document.querySelectorAll(".langtoggle button");
  for (var k = 0; k < lb.length; k++) lb[k].setAttribute("aria-pressed", lb[k].dataset.lang === LANG ? "true" : "false");
  document.title = dict("meta.title");
  for (var m = 0; m < LANG_HOOKS.length; m++) LANG_HOOKS[m]();
}

(function(){
  var btns = document.querySelectorAll(".langtoggle button");
  for (var i = 0; i < btns.length; i++)
    btns[i].addEventListener("click", function(){ LANG = this.dataset.lang; applyLang(); });
})();

/* ======================= view routing ======================= */
var VIEWS = ["install", "beacon", "code", "control", "channels", "settings", "aprs"];
function showView(name){
  if (VIEWS.indexOf(name) < 0) name = "install";
  for (var i = 0; i < VIEWS.length; i++){
    $("view-" + VIEWS[i]).classList.toggle("active", VIEWS[i] === name);
    $("tab-" + VIEWS[i]).classList.toggle("active", VIEWS[i] === name);
  }
  window.scrollTo(0, 0);
}
function routeFromHash(){ showView((location.hash || "").replace("#", "")); }
window.addEventListener("hashchange", routeFromHash);

/* ======================= INSTALL logic ======================= */
(function(){
  var radio = null, backedUp = false;
  function st(id, msg, cls){ var e = $(id); e.textContent = msg; e.className = "status " + (cls || ""); }
  function stepState(id, cls){ $(id).classList.remove("active","done"); if (cls) $(id).classList.add(cls); }
  function activate(id){ $(id).classList.add("active"); }
  function bar(id, done, total){ var b = $(id); b.classList.add("on"); b.firstElementChild.style.width = (total ? Math.round(done*100/total) : 0) + "%"; }

  // environment note + selects
  function refreshEnv(){
    var n = $("envNote"), S = D().install;
    n.classList.remove("warn");
    if (K5.isIOS){ n.innerHTML = S.env.ios; n.classList.add("warn"); }
    else if (!K5.supported()){ n.innerHTML = S.env.unsupported; n.classList.add("warn"); }
    else if (K5.isMobile){ n.innerHTML = S.env.mobile; }
    else { n.innerHTML = S.env.desktop; }
    $("flashDesktopOnly").style.display = K5.isMobile ? "inline" : "none";
  }
  // SSID select is language-independent, build once
  (function(){ var s = $("ssid"); for (var i = 0; i <= 15; i++){ var o = document.createElement("option"); o.value = i; o.textContent = i; s.appendChild(o); } s.value = 0; })();

  function rebuildSelects(){
    var S = D().install;
    var iv = $("intv"); var ivVal = iv.value || "10"; iv.innerHTML = "";
    [0,10,15,30,60].forEach(function(v){ var o = document.createElement("option"); o.value = v; o.textContent = (v === 0) ? S.off : (v + " " + S.min); iv.appendChild(o); });
    iv.value = ivVal;
    var ap = $("aprson"); var apVal = ap.value || "1"; ap.innerHTML = "";
    [["1", S.on],["0", S.off]].forEach(function(p){ var o = document.createElement("option"); o.value = p[0]; o.textContent = p[1]; ap.appendChild(o); });
    ap.value = apVal;
    if (!$("pos").value) $("pos").placeholder = S.posPlaceholder;
  }
  onLang(function(){ refreshEnv(); rebuildSelects(); });

  activate("s1");

  // ---- skip links: mark a step done and advance without performing its action ----
  // (Connect is never skippable — backup/wipe/flash/configure all need the link.)
  function bindSkip(linkId, curId, statusId, nextId, nextBtnId, flashGuard){
    var el = $(linkId); if (!el) return;
    el.addEventListener("click", function(ev){
      ev.preventDefault();
      if (!$(curId).classList.contains("active")) return;   // only when unlocked
      var S = D().install.st;
      stepState(curId, "done"); st(statusId, S.skipped, "");
      activate(nextId);
      if (nextBtnId){
        if (flashGuard && K5.isMobile) st("stFlash", S.flashDesktopOnly, "err");
        else $(nextBtnId).disabled = false;
      }
    });
  }
  bindSkip("skip2", "s2", "stBackup",   "s3", "btnWipe");
  bindSkip("skip3", "s3", "stWipe",     "s4", "btnFlashMode");
  bindSkip("skip4", "s4", "stFlashMode","s5", "btnFlash", true);
  bindSkip("skip5", "s5", "stFlash",    "s6", "btnSave");
  bindSkip("skip6", "s6", "stSave",     "s7", null);

  $("btnConnect").addEventListener("click", async function(){
    var S = D().install.st;
    var t = K5.pickTransport();
    if (!t){ st("stConnect", S.noSerial, "err"); return; }
    st("stConnect", S.selectAdapter);
    try {
      await t.connect();
      radio = new K5.Radio(t);
      var ver = null;
      for (var attempt = 0; attempt < 3 && !ver; attempt++) ver = await radio.hello();
      if (!ver){
        // DIAGNOSTIC (build b10): resend hello and dump whatever the radio returns, raw.
        // 0 bytes => the reply isn't reaching the browser; N bytes => a parse issue.
        var got = new Uint8Array(0);
        try {
          await t.send(K5.frameCommand(0x0514, new Uint8Array(K5.TS)));
          var dl = Date.now() + 1500;
          while (Date.now() < dl){
            var c = await t.recv(256, 250);
            if (c && c.length){ var nn = new Uint8Array(got.length + c.length); nn.set(got); nn.set(c, got.length); got = nn; }
          }
        } catch(e){}
        var hex = Array.prototype.map.call(got, function(b){ return ("0" + b.toString(16)).slice(-2); }).join(" ");
        $("raw").value = "DIAG build b10 · hello raw · " + got.length + " byte(s):\n" + (hex || "(nothing received)");
        $("raw").style.display = "block";
        st("stConnect", S.noAnswer, "err");
        try { await t.disconnect(); } catch(_e){}
        radio = null;
        return;
      }
      st("stConnect", S.connected(ver), "ok");
      stepState("s1","done"); activate("s2"); $("btnBackup").disabled = false;
    } catch(e){
      var m = (e && e.message) ? e.message : String(e);
      var busy = /open|in use|already|network/i.test(m);
      st("stConnect", busy ? S.portBusy : S.connFailed, "err");
      if (!/No device selected|cancel/i.test(m)){ $("raw").value = (e && e.name ? e.name + "\n" : "") + m; $("raw").style.display = "block"; }
      try { if (t) await t.disconnect(); } catch(_e){}
      radio = null;
    }
  });

  function download(name, bytes){
    var url = URL.createObjectURL(new Blob([bytes], {type:"application/octet-stream"}));
    var a = document.createElement("a"); a.href = url; a.download = name; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }
  $("btnBackup").addEventListener("click", async function(){
    var S = D().install.st;
    if (!radio) return;
    $("btnBackup").disabled = true; st("stBackup", S.reading);
    try {
      var full = await radio.dumpEeprom(0x0000, 0x2000, function(d,t){ bar("barBackup", d, t); });
      var stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,"");
      download("uvk5-eeprom-" + stamp + ".bin", full);
      download("uvk5-calibration-" + stamp + ".bin", full.slice(0x1E00, 0x2000));
      backedUp = true;
      st("stBackup", S.backupOk, "ok");
      stepState("s2","done"); activate("s3"); $("btnWipe").disabled = false;
    } catch(e){ st("stBackup", S.backupFail(e && e.message ? e.message : e), "err"); $("btnBackup").disabled = false; }
  });

  $("btnWipe").addEventListener("click", async function(){
    var S = D().install.st;
    if (!radio) return;
    if (!backedUp && !confirm(S.wipeConfirm)) return;
    $("btnWipe").disabled = true; st("stWipe", S.wiping);
    try {
      await radio.wipe(0x0000, 0x1E00, function(d,t){ bar("barWipe", d, t); });
      var chk = await radio.readCfg(0x0000, 8);
      var ok = Array.prototype.every.call(chk, function(b){ return b === 0xFF; });
      if (!ok) throw new Error(S.verifyFail);
      st("stWipe", S.wipeOk, "ok");
      stepState("s3","done"); activate("s4"); $("btnFlashMode").disabled = false;
    } catch(e){ st("stWipe", S.wipeFail(e && e.message ? e.message : e), "err"); $("btnWipe").disabled = false; }
  });

  $("btnFlashMode").addEventListener("click", async function(){
    var S = D().install.st;
    if (!radio) return;
    st("stFlashMode", S.listening);
    try {
      var b = await radio.waitBeacon(6000);
      if (!b){ st("stFlashMode", S.noBeacon, "err"); return; }
      st("stFlashMode", S.flashModeOk(b), "ok");
      stepState("s4","done"); activate("s5");
      if (K5.isMobile){ st("stFlash", S.flashDesktopOnly, "err"); }
      else { $("btnFlash").disabled = false; }
    } catch(e){ st("stFlashMode", S.genericErr(e && e.message ? e.message : e), "err"); }
  });

  $("btnFlash").addEventListener("click", async function(){
    var S = D().install.st;
    if (!radio || K5.isMobile) return;
    $("btnFlash").disabled = true; st("stFlash", S.downloading);
    try {
      var resp = await fetch(FW_URL, {cache:"no-store"});
      if (!resp.ok) throw new Error(S.cannotLoad(FW_URL, resp.status));
      var fw = new Uint8Array(await resp.arrayBuffer());
      st("stFlash", S.flashing(fw.length));
      await radio.flash(fw, FW_VERSION, function(d,t){ bar("barFlash", d, t); st("stFlash", S.flashingChunk(d, t)); });
      st("stFlash", S.flashComplete, "ok");
      stepState("s5","done"); activate("s6");
      setTimeout(async function(){
        try { var v = await radio.hello(); if (v){ st("stSave", S.newFwRunning(v), "ok"); } } catch(e){}
      }, 2500);
      $("btnSave").disabled = false;
    } catch(e){
      st("stFlash", S.flashFail(e && e.message ? e.message : e), "err");
      $("btnFlash").disabled = false;
    }
  });

  $("btnGps").addEventListener("click", function(){
    var S = D().install.st;
    if (!navigator.geolocation){ st("stSave", S.noGeo, "err"); return; }
    st("stSave", S.gettingGps);
    navigator.geolocation.getCurrentPosition(function(p){
      $("pos").dataset.lat = p.coords.latitude; $("pos").dataset.lon = p.coords.longitude;
      var la = Math.abs(p.coords.latitude).toFixed(4) + (p.coords.latitude < 0 ? "S" : "N");
      var lo = Math.abs(p.coords.longitude).toFixed(4) + (p.coords.longitude < 0 ? "W" : "E");
      $("pos").value = la + "  " + lo + "  (±" + Math.round(p.coords.accuracy) + " m)";
      st("stSave", S.posCaptured, "ok");
    }, function(){ st("stSave", S.gpsFail, "err"); },
       {enableHighAccuracy:true, timeout:20000, maximumAge:0});
  });

  function cleanCall(s, max){
    s = (s || "").toUpperCase(); var out = "";
    for (var i = 0; i < s.length && out.length < max; i++){ var c = s[i];
      if ((c >= "0" && c <= "9") || (c >= "A" && c <= "Z") || (c === "-" && max > 6)) out += c; }
    return out;
  }
  $("btnSave").addEventListener("click", async function(){
    var S = D().install.st;
    if (!radio) return;
    var call = cleanCall($("call").value, 6);
    if (call.length < 3){ st("stSave", S.badCall, "err"); return; }
    var ssid = parseInt($("ssid").value, 10) & 0x0F;
    var intv = parseInt($("intv").value, 10) & 0xFF;
    var on = parseInt($("aprson").value, 10) ? 1 : 0;
    var msgto = cleanCall($("msgto").value, 9);
    var lat = $("pos").dataset.lat, lon = $("pos").dataset.lon;
    var latU = lat !== undefined ? Math.round(parseFloat(lat) * 1e6) : 0;
    var lonU = lon !== undefined ? Math.round(parseFloat(lon) * 1e6) : 0;

    var A = new Uint8Array(16); A.fill(0xFF);
    A[0] = on; A[1] = intv; A[2] = ssid;
    for (var i = 0; i < 7; i++) A[3+i] = (i < call.length) ? call.charCodeAt(i) : 0;
    new DataView(A.buffer).setInt32(10, latU, true);
    var B = new Uint8Array(16); B.fill(0xFF);
    new DataView(B.buffer).setInt32(0, lonU, true);
    for (var jj = 0; jj < 10; jj++) B[4+jj] = (jj < msgto.length) ? msgto.charCodeAt(jj) : 0;

    $("btnSave").disabled = true; st("stSave", S.writing);
    try {
      await radio.writeCfg(0x0E30, A);
      await radio.writeCfg(0x0F20, B);
      await radio.reboot();
      st("stSave", S.saved(call + (ssid ? "-" + ssid : "")), "ok");
      stepState("s6","done"); activate("s7");
    } catch(e){ st("stSave", S.writeFail(e && e.message ? e.message : e), "err"); $("btnSave").disabled = false; }
  });
})();

/* ======================= BEACON logic ======================= */
(function(){
  var transport = null;
  var isMobile = K5.isMobile;
  function cmdBeaconAt(latU, lonU){ var d = new Uint8Array(8), dv = new DataView(d.buffer); dv.setInt32(0, latU, true); dv.setInt32(4, lonU, true); return K5.frameCommand(0x0704, d); }

  var connectBtn = $("bxConnect"), beaconBtn = $("bxBeacon");
  var connStatus = $("bxConnStatus"), txStatus = $("bxTxStatus");
  var fix = $("bxFix"), coordsEl = $("bxCoords"), metaEl = $("bxMeta");
  var showAllLink = $("bxShowAll");
  var trackBtn = $("bxTrack"), trackStatus = $("bxTrackStatus"), ivlInput = $("bxIvl");
  var smartBox = $("bxSmart"), ivlLabel = $("bxIvlLabel"), ivlUnit = $("bxIvlUnit");

  function setConn(msg, cls){ connStatus.textContent = msg; connStatus.className = "status " + (cls || ""); }
  function setTx(msg, cls){ txStatus.textContent = msg; txStatus.className = "status " + (cls || ""); }
  function setTrack(msg, cls){ trackStatus.textContent = msg; trackStatus.className = "status " + (cls || ""); }

  var connected = false, tracking = false;
  function relabel(){
    var B = D().beacon;
    connectBtn.textContent = connected ? B.connected : B.connect;
    trackBtn.textContent = tracking ? B.trackStop : B.trackStart;
    if (smartBox.checked){ ivlLabel.textContent = B.fastRate; ivlUnit.textContent = B.unitAtSpeed; }
    else { ivlLabel.textContent = B.every; ivlUnit.textContent = B.unitS; }
  }
  onLang(relabel);

  async function tryConnect(makeTransport, preDevice){
    var B = D().beacon.st;
    transport = makeTransport();
    if (!preDevice) setConn(B.chooseAdapter);
    await transport.connect(preDevice);
    connected = true;
    setConn(B.connectedVia(transport.name), "ok");
    connectBtn.classList.add("connected");
    connectBtn.textContent = D().beacon.connected;
    beaconBtn.disabled = false;
    trackBtn.disabled = false;
  }

  connectBtn.addEventListener("click", async function(){
    var B = D().beacon.st;
    try {
      if (!isMobile && ("serial" in navigator)) await tryConnect(K5.makeWebSerial);
      else if ("usb" in navigator)              await tryConnect(function(){ return K5.makeWebUsb(false); });
      else if ("serial" in navigator)           await tryConnect(K5.makeWebSerial);
      else { setConn(B.neither, "err"); }
    } catch(e){
      var msg = (e && e.message) ? e.message : String(e);
      if (/No device selected|cancell/i.test(msg)) setConn(B.noPick, "err");
      else setConn(B.connFailDetail, "err");
      var box = $("bxRawErr"); box.value = (e && e.name ? e.name + "\n" : "") + msg; box.style.display = "block";
      transport = null; connected = false;
      showAllLink.style.display = ("usb" in navigator) ? "inline" : "none";
    }
  });

  showAllLink.addEventListener("click", async function(ev){
    ev.preventDefault();
    try { await tryConnect(function(){ return K5.makeWebUsb(true); }); showAllLink.style.display = "none"; }
    catch(e){ setConn(D().beacon.st.stillFailed((e && e.message) ? e.message : e), "err"); }
  });

  async function sendFix(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude, acc = Math.round(pos.coords.accuracy);
    await transport.send(cmdBeaconAt(Math.round(lat * 1e6), Math.round(lon * 1e6)));
    coordsEl.textContent = Math.abs(lat).toFixed(4) + (lat < 0 ? "S" : "N") + "  " + Math.abs(lon).toFixed(4) + (lon < 0 ? "W" : "E");
    metaEl.textContent = "±" + acc + " m  ·  " + new Date().toLocaleTimeString();
    fix.classList.add("on");
  }
  function geoErr(setter){
    return function(err){
      var B = D().beacon.st;
      if (err && err.code === 1) setter(B.permDenied, "err");
      else if (err && err.code === 3) setter(B.gpsTimeout, "err");
      else setter(B.locFail, "err");
    };
  }

  beaconBtn.addEventListener("click", function(){
    var B = D().beacon.st;
    if (!transport){ setTx(B.connectFirst, "err"); return; }
    if (!navigator.geolocation){ setTx(B.noGeo, "err"); return; }
    setTx(B.waitingGps); beaconBtn.disabled = true;
    navigator.geolocation.getCurrentPosition(async function(pos){
      try { await sendFix(pos); setTx(D().beacon.st.beaconSent, "ok"); }
      catch(e){ setTx(D().beacon.st.sendFail(e && e.message ? e.message : e), "err"); }
      beaconBtn.disabled = false;
    }, function(e){ beaconBtn.disabled = false; geoErr(setTx)(e); },
       {enableHighAccuracy:true, timeout:20000, maximumAge:0});
  });

  // ---- Live tracking ----
  var watchId = null, timerId = null, wakeLock = null;
  var lastPos = null, sentCount = 0, sending = false, lastBeaconMs = 0, lastHeading = null;
  var SB = { slowSpeed:5, fastSpeed:90, turnMin:27, turnSlope:255, turnTime:15 };

  smartBox.addEventListener("change", relabel);

  async function acquireWakeLock(){ try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch(e){} }
  function releaseWakeLock(){ try { if (wakeLock) wakeLock.release(); } catch(e){} wakeLock = null; }
  document.addEventListener("visibilitychange", function(){
    if (tracking && document.visibilityState === "visible" && !wakeLock) acquireWakeLock();
  });

  function maybeBeacon(){
    if (!tracking || !lastPos || sending) return;
    var now = Date.now(), elapsed = (now - lastBeaconMs) / 1000;
    var fast = Math.max(30, Math.min(1800, parseInt(ivlInput.value, 10) || 60));
    var reason = null;
    if (!smartBox.checked){ if (elapsed >= fast) reason = "fixed"; }
    else {
      var spd = (lastPos.coords.speed != null && lastPos.coords.speed >= 0) ? lastPos.coords.speed * 3.6 : 0;
      var slow = Math.min(1800, fast * 10), rate;
      if (spd < SB.slowSpeed) rate = slow;
      else if (spd > SB.fastSpeed) rate = fast;
      else rate = Math.max(fast, Math.min(slow, fast * SB.fastSpeed / spd));
      var hd = lastPos.coords.heading;
      if (hd != null && lastHeading != null && elapsed > SB.turnTime && spd >= SB.slowSpeed){
        var dh = Math.abs(hd - lastHeading); if (dh > 180) dh = 360 - dh;
        var thresh = SB.turnMin + SB.turnSlope / Math.max(spd, 1);
        if (dh > thresh) reason = "turn";
      }
      if (elapsed >= rate) reason = "time";
      window._sbInfo = Math.round(spd) + " km/h, ~" + Math.round(rate) + "s";
    }
    if (reason) doBeacon(reason);
  }
  async function doBeacon(reason){
    sending = true;
    try {
      await sendFix(lastPos);
      lastBeaconMs = Date.now();
      lastHeading = (lastPos.coords.heading != null) ? lastPos.coords.heading : lastHeading;
      sentCount++;
      setTrack(D().beacon.st.tracking(sentCount, reason, (smartBox.checked && window._sbInfo ? ", " + window._sbInfo : "")), "ok");
    } catch(e){ setTrack(D().beacon.st.trackSendFail(e && e.message ? e.message : e), "err"); stopTracking(); }
    sending = false;
  }
  function startTracking(){
    var B = D().beacon.st;
    if (!transport){ setTrack(B.connectFirst, "err"); return; }
    if (!navigator.geolocation){ setTrack(B.noGeo, "err"); return; }
    tracking = true; sentCount = 0; lastPos = null; lastBeaconMs = 0; lastHeading = null;
    trackBtn.textContent = D().beacon.trackStop;
    trackBtn.style.background = "var(--warn)"; trackBtn.style.color = "#fff";
    beaconBtn.disabled = true; ivlInput.disabled = true; smartBox.disabled = true;
    setTrack(B.acquiring);
    acquireWakeLock();
    watchId = navigator.geolocation.watchPosition(function(pos){ lastPos = pos; maybeBeacon(); }, geoErr(setTrack),
      {enableHighAccuracy:true, timeout:30000, maximumAge:5000});
    timerId = setInterval(maybeBeacon, 3000);
  }
  function stopTracking(){
    tracking = false;
    if (watchId !== null){ navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (timerId !== null){ clearInterval(timerId); timerId = null; }
    releaseWakeLock();
    trackBtn.textContent = D().beacon.trackStart;
    trackBtn.style.background = "var(--ok)"; trackBtn.style.color = "#04120a";
    ivlInput.disabled = false; smartBox.disabled = false; beaconBtn.disabled = !transport;
  }
  trackBtn.addEventListener("click", function(){ tracking ? stopTracking() : startTracking(); });

  // auto-reconnect on load to an already-permitted adapter (mobile WebUSB)
  if (isMobile && ("usb" in navigator)){
    navigator.usb.getDevices().then(function(list){
      for (var i = 0; i < list.length; i++){
        var v = list[i].vendorId;
        if (v === 0x1A86 || v === 0x10C4 || v === 0x0403 || v === 0x067B){
          tryConnect(function(){ return K5.makeWebUsb(false); }, list[i]).catch(function(){});
          return;
        }
      }
    }).catch(function(){});
  }
  // up-front support hint
  if (!("serial" in navigator) && !("usb" in navigator)){
    setConn(K5.isIOS ? D().beacon.st.iosHint : D().beacon.st.noWebSerial, "err");
  } else if (isMobile && !("usb" in navigator)){
    setConn(D().beacon.st.androidNoUsb, "err");
  }
})();

/* ======================= CODE tool logic ======================= */
(function(){
  var CS = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ -./?!@:,'";
  var btn = $("git"), durum = $("cDurum"), panel = $("cPanel"), kodEl = $("cKod"), metaEl = $("cMeta");
  var lastState = null;

  function relabelSteps(){
    var C = D().code;
    var ol = $("cSteps"); ol.innerHTML = "";
    for (var j = 0; j < C.steps.length; j++){ var li = document.createElement("li"); li.innerHTML = C.steps[j]; ol.appendChild(li); }
    if (!btn.disabled)
      btn.textContent = (lastState === "done") ? C.refreshBtn : (lastState === "err") ? C.retryBtn : C.getBtn;
  }
  onLang(relabelSteps);

  function kodYap(lat, lon){
    var la = Math.round((lat + 90) * 10000), lo = Math.round((lon + 180) * 10000);
    if (la < 0 || la > 1800000 || lo < 0 || lo > 3600000) return null;
    var ds = String(la).padStart(7, "0") + String(lo).padStart(7, "0");
    var sum = 0; for (var i = 0; i < 14; i++) sum += (i + 1) * Number(ds[i]);
    return ds + String(sum % 10);
  }
  function goster(pos){
    var C = D().code;
    var lat = pos.coords.latitude, lon = pos.coords.longitude, acc = Math.round(pos.coords.accuracy);
    var kod = kodYap(lat, lon);
    btn.disabled = false; lastState = "done"; btn.textContent = C.refreshBtn;
    if (!kod){ durum.className = "status err"; durum.textContent = C.outOfRange; return; }
    durum.className = "status"; durum.textContent = "";
    kodEl.textContent = kod.slice(0,5) + " " + kod.slice(5,10) + " " + kod.slice(10,15);
    metaEl.textContent = lat.toFixed(4) + "°  " + lon.toFixed(4) + "°  (±" + acc + " m)";
    if (acc > 100){ durum.className = "status err"; durum.textContent = C.lowAcc(acc); }
    panel.classList.add("on");
  }
  function hata(e){
    var C = D().code;
    btn.disabled = false; lastState = "err"; btn.textContent = C.retryBtn;
    durum.className = "status err";
    durum.textContent = (e && e.code === 1) ? C.denied : (e && e.code === 3) ? C.timeout : C.failed;
  }
  btn.addEventListener("click", function(){
    var C = D().code;
    if (!navigator.geolocation){ durum.className = "status err"; durum.textContent = C.noGeo; return; }
    btn.disabled = true; btn.textContent = C.searchingBtn;
    durum.className = "status"; durum.textContent = C.waiting;
    navigator.geolocation.getCurrentPosition(goster, hata, {enableHighAccuracy:true, timeout:20000, maximumAge:0});
  });

  function metinKodla(girisId, panelId, kodId, metaId){
    var giris = $(girisId), pan = $(panelId), kodOut = $(kodId), metaOut = $(metaId);
    giris.addEventListener("input", function(){
      var t = giris.value.toUpperCase(), pairs = [], temiz = "", atlandi = false;
      for (var idx = 0; idx < t.length; idx++){
        var i = CS.indexOf(t[idx]);
        if (i < 0){ atlandi = true; continue; }
        pairs.push(String(i).padStart(2, "0")); temiz += t[idx];
      }
      if (pairs.length === 0){ pan.classList.remove("on"); return; }
      kodOut.textContent = pairs.join(" ");
      metaOut.textContent = temiz + (atlandi ? D().code.skipped : "");
      pan.classList.add("on");
    });
  }
  metinKodla("cCagri", "cCagriPanel", "cCagriKod", "cCagriMeta");
  metinKodla("cMesaj", "cMesajPanel", "cMesajKod", "cMesajMeta");
})();

/* ======================= RADIO CONTROL ======================= */
(function(){
  var radio = null, running = false, pollTimer = null, connected = false;
  var canvas = $("rcScreen"), ctx = canvas.getContext("2d");
  var rcConnect = $("rcConnect");
  function rcSt(msg, cls){ var e = $("rcStatus"); e.textContent = msg; e.className = "status " + (cls || ""); }

  var POW = ["USER","L1","L2","L3","L4","L5","MID","HIGH"];
  var MOD = ["FM","AM","USB"];

  function fillSelect(sel, arr){ sel.innerHTML = ""; for (var i = 0; i < arr.length; i++){ var o = document.createElement("option"); o.value = i; o.textContent = arr[i]; sel.appendChild(o); } }
  fillSelect($("rcPow"), POW);
  fillSelect($("rcBw"), ["Wide","Narrow"]);
  fillSelect($("rcMod"), MOD);

  // render the 1024-byte paged framebuffer (8 pages x 128 cols, bit0 = top) to the canvas
  function renderScreen(buf){
    var img = ctx.createImageData(128, 64);
    for (var page = 0; page < 8; page++){
      for (var col = 0; col < 128; col++){
        var b = buf[page * 128 + col];
        for (var bit = 0; bit < 8; bit++){
          var on = (b >> bit) & 1;
          var idx = (((page * 8 + bit) * 128) + col) * 4;
          img.data[idx]     = on ? 255 : 22;
          img.data[idx + 1] = on ? 176 : 18;
          img.data[idx + 2] = on ? 32  : 8;
          img.data[idx + 3] = 255;
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  function renderState(s){
    if (!s){ $("rcState").innerHTML = ""; return; }
    var mhz = (s.rxFreq / 100000).toFixed(4);              // 10 Hz units -> MHz
    var mod = MOD[s.modulation] || "?";
    var bw  = s.bandwidth ? "Narrow" : "Wide";
    var pow = ["USER","LOW1","LOW2","LOW3","LOW4","LOW5","MID","HIGH"][s.power] || "?";
    $("rcState").innerHTML =
      "<div>RX <b>" + mhz + "</b> MHz</div>" +
      "<div>" + (s.isTx ? "<span class='tx'>● TX " + (s.txFreq / 100000).toFixed(4) + "</span>" : "RSSI <b>" + s.rssi + "</b>") + "</div>" +
      "<div>" + mod + " · " + bw + " · " + pow + "</div>" +
      "<div>Batt <b>" + (s.batteryMv / 1000).toFixed(2) + "</b> V</div>";
    if (document.activeElement !== $("rcPow")) $("rcPow").value = s.power;
    if (document.activeElement !== $("rcBw"))  $("rcBw").value  = s.bandwidth;
    if (document.activeElement !== $("rcMod")) $("rcMod").value = s.modulation;
  }

  function loop(){
    if (!running) return;
    if (!$("view-control").classList.contains("active")){ pollTimer = setTimeout(loop, 500); return; }
    (async function(){
      try {
        var buf = await radio.pollScreen(1200);
        if (buf) renderScreen(buf);
        var s = await radio.getState();
        if (s) renderState(s);
      } catch(e){}
      if (running) pollTimer = setTimeout(loop, 280);
    })();
  }

  // key buttons: pointer down = press, >600ms = held, up/leave = release
  function bindKey(btn){
    var code = parseInt(btn.dataset.key, 10), holdT = null, down = false;
    function press(e){ if (e) e.preventDefault(); if (down || !radio) return; down = true;
      radio.injectKey(code, 1);
      holdT = setTimeout(function(){ if (down && radio) radio.injectKey(code, 3); }, 600);
    }
    function release(){ if (!down) return; down = false; clearTimeout(holdT); if (radio) radio.injectKey(code, 0); }
    btn.addEventListener("pointerdown", press);
    btn.addEventListener("pointerup", release);
    btn.addEventListener("pointerleave", release);
    btn.addEventListener("pointercancel", release);
    btn.addEventListener("contextmenu", function(e){ e.preventDefault(); });
  }
  var keys = document.querySelectorAll("#view-control button.rk");
  for (var i = 0; i < keys.length; i++) bindKey(keys[i]);

  // PTT: transmit only while held
  var ptt = $("rcPtt");
  ptt.addEventListener("pointerdown", function(e){ e.preventDefault(); if (!radio) return; ptt.classList.add("tx"); radio.injectKey(16, 1); });
  function pttUp(){ if (!radio) return; ptt.classList.remove("tx"); radio.injectKey(16, 0); }
  ptt.addEventListener("pointerup", pttUp);
  ptt.addEventListener("pointerleave", pttUp);
  ptt.addEventListener("pointercancel", pttUp);

  $("rcPow").addEventListener("change", function(){ if (radio) radio.setPower(parseInt(this.value, 10)); });
  $("rcBw").addEventListener("change",  function(){ if (radio) radio.setBandwidth(parseInt(this.value, 10)); });
  $("rcMod").addEventListener("change", function(){ if (radio) radio.setModulation(parseInt(this.value, 10)); });

  onLang(function(){ rcConnect.textContent = connected ? D().control.connected : D().control.connect; });

  rcConnect.addEventListener("click", async function(){
    var S = D().control.st;
    if (connected){ return; }
    var t = K5.pickTransport();
    if (!t){ rcSt(D().beacon.st.neither, "err"); return; }
    rcSt(S.connecting);
    try {
      await t.connect();
      radio = new K5.Radio(t);
      var ver = await radio.hello();
      var s = ver ? await radio.getState() : null;
      if (!s){ rcSt(S.needFw, "err"); try { await t.disconnect(); } catch(e){} radio = null; return; }
      connected = true;
      rcSt(S.connected(ver), "ok");
      rcConnect.textContent = D().control.connected; rcConnect.classList.add("connected");
      $("rcPanel").style.display = "block";
      renderState(s);
      running = true; loop();
    } catch(e){
      var m = (e && e.message) ? e.message : String(e);
      var busy = /open|in use|already|network/i.test(m);
      rcSt(busy ? S.portBusy : S.connFail, "err");
      try { if (t) await t.disconnect(); } catch(_e){}
      radio = null;
    }
  });
})();

  function stepLabel(i){ var v=K5.STEP_HZ[i]; return v==null?("?"+i):((v/100).toString()+" kHz"); }

  // populate the fixed modal selects once

  });

    var S=D().chan.st;

    if(!radio) return; var S=D().chan.st;

    try{
      channels = await radio.readChannels(0,199,function(d,t){ chBar(d,t); chProg(S.reading(d,t)); });
      renderTable();
      chProg(S.readDone(channels.filter(function(c){return !c.empty;}).length),"ok");
    }catch(e){ chProg(S.writeFail(e&&e.message?e.message:e),"err"); }
    $("chRead").disabled=false;
  });

  $("chImportBtn").addEventListener("click", function(){ if(radio) $("chFile").click(); else chProg(D().chan.st.connFail,"err"); });
  $("chFile").addEventListener("change", async function(){
    var f=this.files[0]; if(!f||!radio) return;
    var S=D().chan.st; chProg(S.importReading);
    var buf=new Uint8Array(await f.arrayBuffer());
    this.value="";
    if(buf.length < 0x1C00){ chProg(S.importBad,"err"); return; }
    var list=[];
    for(var ch=0; ch<200; ch++){
      var attr=buf[0x0D60+ch]; if(attr===0xFF) continue;
      var rec=buf.slice(ch*16, ch*16+16), name=buf.slice(0x0F50+ch*16, 0x0F50+ch*16+16);
      var c=K5.decodeChannel(rec, attr, name); c.index=ch; list.push(c);
    }

      chBar(i+1,list.length); chProg(S.importWriting(i+1,list.length));
    }
    channels=list; renderTable(); chProg(S.importDone(list.length),"ok");
  });

  onLang(function(){ chConnect.textContent = connected ? D().chan.connected : D().chan.connect; });
})();

  function sCall(m,v){ v=(v||"").toUpperCase().slice(0,6); for(var i=0;i<7;i++) m[0x0E33+i]=(i<v.length)?v.charCodeAt(i):0; markRange(0x0E33,7); }
  function gMsg(m){ var s=""; for(var i=0;i<10;i++){ var c=m[0x0F24+i]; if(c<=32||c>=127)break; s+=String.fromCharCode(c);} return s; }
  function sMsg(m,v){ v=(v||"").toUpperCase().slice(0,9); for(var i=0;i<10;i++) m[0x0F24+i]=(i<v.length)?v.charCodeAt(i):0; markRange(0x0F24,10); }
  function gDeg(a){ return function(m){ return (new DataView(m.buffer,m.byteOffset+a,4)).getInt32(0,true)/1e6; }; }
  function sDeg(a){ return function(m,v){ (new DataView(m.buffer,m.byteOffset+a,4)).setInt32(0, Math.round((parseFloat(v)||0)*1e6), true); markRange(a,4); }; }

  function G(en,tr){ return {en:en,tr:tr}; }
  function L(o){ return (LANG==="tr" && o.tr) ? o.tr : o.en; }

    { t:G("APRS","APRS"), f:[
      {id:"call",  l:G("Callsign","Çağrı işareti"),  type:"text", max:6, get:gCall, set:sCall},
      {id:"ssid",  l:G("SSID","SSID"),               type:"int", min:0, max:15, get:gB(0x0E32), set:sB(0x0E32)},
      {id:"lat",   l:G("Latitude °","Enlem °"),      type:"deg", wide:1, get:gDeg(0x0E3A), set:sDeg(0x0E3A)},
      {id:"lon",   l:G("Longitude °","Boylam °"),    type:"deg", wide:1, get:gDeg(0x0F20), set:sDeg(0x0F20)},
      {id:"aon",   l:G("Listen on boot","Açılışta dinle"), type:"enum", o:["Off","On"], ot:["Kapalı","Açık"], get:gB(0x0E30), set:sB(0x0E30)},
      {id:"intv",  l:G("Beacon interval (min)","Beacon aralığı (dk)"), type:"int", min:0, max:60, get:gB(0x0E31), set:sB(0x0E31)},
      {id:"msg",   l:G("Message target","Mesaj hedefi"), type:"text", max:9, wide:1, get:gMsg, set:sMsg}
    ]},
    { t:G("Radio","Telsiz"), f:[
      {id:"sql",   l:G("Squelch","Susturucu"),       type:"int", min:0, max:9, get:gB(0x0E71), set:sB(0x0E71)},
      {id:"pwr",   l:G("TX power","TX gücü"),        type:"enum", o:["<20mW","125mW","250mW","500mW","1W","2W","5W"], get:gHi(0x1FF7), set:sHi(0x1FF7)},
      {id:"ptt",   l:G("PTT mode","PTT modu"),       type:"enum", o:["Classic","One-push"], ot:["Klasik","Tek-bas"], get:gLo(0x1FF7), set:sLo(0x1FF7)},
      {id:"txvfo", l:G("TX VFO","TX VFO"),           type:"enum", o:["A","B"], get:gB(0x0EAB), set:sB(0x0EAB)},
      {id:"batsav",l:G("Battery save","Pil tasarrufu"), type:"enum", o:["Off","1:1","1:2","1:3","1:4","1:5"], ot:["Kapalı","1:1","1:2","1:3","1:4","1:5"], get:gB(0x0E7B), set:sB(0x0E7B)},
      {id:"battyp",l:G("Battery type","Pil tipi"),   type:"enum", o:["1600 mAh","2200 mAh","3500 mAh"], get:gB(0x0EAC), set:sB(0x0EAC)}
    ]},
    { t:G("Display & audio","Ekran & ses"), f:[
      {id:"blmax", l:G("Backlight max","Arka ışık maks"), type:"int", min:1, max:10, get:gLo(0x0E78), set:sLo(0x0E78)},
      {id:"blmin", l:G("Backlight min","Arka ışık min"),  type:"int", min:0, max:9, get:gHi(0x0E78), set:sHi(0x0E78)},
      {id:"abr",   l:G("Backlight time (s, 0=off)","Arka ışık süresi (sn, 0=kapalı)"), type:"int", min:0, max:61, get:gB(0x0E7D), set:sB(0x0E7D)},
      {id:"mdf",   l:G("Channel display","Kanal görünümü"), type:"enum", o:["Frequency","Channel #","Name","Name + freq"], ot:["Frekans","Kanal #","Ad","Ad + frekans"], get:gB(0x0E79), set:sB(0x0E79)},
      {id:"pon",   l:G("Power-on screen","Açılış ekranı"), type:"enum", o:["All","Sound","Message","Voltage","None"], ot:["Hepsi","Ses","Mesaj","Voltaj","Yok"], get:gB(0x0E97), set:sB(0x0E97)},
      {id:"beep",  l:G("Key beep","Tuş sesi"),       type:"enum", o:["Off","On"], ot:["Kapalı","Açık"], get:gBit(0x0E90,0), set:sBit(0x0E90,0)},
      {id:"roger", l:G("Roger beep","Roger sesi"),   type:"enum", o:["Off","Roger","MDC"], ot:["Kapalı","Roger","MDC"], get:gB(0x0EA9), set:sB(0x0EA9)},
      {id:"ctr",   l:G("Contrast","Kontrast"),       type:"int", min:1, max:15, get:gLo(0x1FF5), set:sLo(0x1FF5)},
      {id:"smet",  l:G("S-meter style","S-metre stili"), type:"enum", o:["Tiny","Classic"], ot:["Küçük","Klasik"], get:gBit(0x1FF5,6), set:sBit(0x1FF5,6)},
      {id:"gui",   l:G("UI style","Arayüz stili"),   type:"enum", o:["Tiny","Classic"], ot:["Küçük","Klasik"], get:gBit(0x1FF5,7), set:sBit(0x1FF5,7)},
      {id:"inv",   l:G("Invert LCD","LCD ters"),     type:"enum", o:["Off","On"], ot:["Kapalı","Açık"], get:gBit(0x1FF5,4), set:sBit(0x1FF5,4)}
    ]},
    { t:G("TX alerts","TX uyarıları"), f:[
      {id:"tot",   l:G("TX timeout alert","TX zaman aşımı uyarısı"), type:"enum", o:["Off","Sound","Visual","All"], ot:["Kapalı","Ses","Görsel","Hepsi"], get:gHi(0x1FF6), set:sHi(0x1FF6)},
      {id:"eot",   l:G("End-of-TX alert","TX sonu uyarısı"), type:"enum", o:["Off","Sound","Visual","All"], ot:["Kapalı","Ses","Görsel","Hepsi"], get:gLo(0x1FF6), set:sLo(0x1FF6)}
    ]}
  ];

  function buildForm(){
    var form=$("seForm"); if(!form) return; form.innerHTML="";
    GROUPS.forEach(function(g){
      var h=document.createElement("h2"); h.className="sec"; h.textContent=L(g.t); form.appendChild(h);
      var grid=document.createElement("div"); grid.className="grid";
      g.f.forEach(function(fld){
        var lab=document.createElement("label"); lab.className="f"+(fld.wide?" wide":"");
        var sp=document.createElement("span"); sp.textContent=L(fld.l); lab.appendChild(sp);
        var c;
        if(fld.type==="enum"){
          c=document.createElement("select");
          var opts=(LANG==="tr"&&fld.ot)?fld.ot:fld.o;
          opts.forEach(function(o,i){ var op=document.createElement("option"); op.value=i; op.textContent=o; c.appendChild(op); });
        } else {
          c=document.createElement("input");
          if(fld.type==="int"){ c.type="number"; c.min=fld.min; c.max=fld.max; }
          else if(fld.type==="deg"){ c.type="text"; c.inputMode="decimal"; c.placeholder="0.000000"; }
          else { c.maxLength=fld.max; c.autocomplete="off"; c.spellcheck=false; }
        }
        c.id="se_"+fld.id; c.disabled=!mem;
        c.addEventListener("change", function(){ if(!mem) return; var v=(fld.type==="enum"||fld.type==="int")?parseInt(c.value,10):c.value; fld.set(mem,v); });
        lab.appendChild(c); grid.appendChild(lab);
      });
      form.appendChild(grid);
    });
    if(mem) populate();
  }

  function populate(){
    GROUPS.forEach(function(g){ g.f.forEach(function(fld){
      var c=$("se_"+fld.id); if(!c) return;
      var v=fld.get(mem);
      c.value=(fld.type==="deg" && typeof v==="number") ? v.toFixed(6) : v;
      c.disabled=false;
    }); });
  }

  seConnect.addEventListener("click", async function(){
    var S=D().set.st; if(connected) return;
    var t=K5.pickTransport(); if(!t){ seSt(D().beacon.st.neither,"err"); return; }
    seSt(S.connecting);
    try{
      await t.connect(); radio=new K5.Radio(t);
      var ver=await radio.hello();
      if(!ver){ seSt(D().install.st.noAnswer,"err"); try{await t.disconnect();}catch(e){} radio=null; return; }
      connected=true; seSt(S.connected(ver),"ok");
      seConnect.textContent=D().set.connected; seConnect.classList.add("connected");
      $("sePanel").style.display="block";
    }catch(e){
      var m=(e&&e.message)?e.message:String(e), busy=/open|in use|already|network/i.test(m);
      seSt(busy?S.portBusy:S.connFail,"err"); try{if(t)await t.disconnect();}catch(_e){} radio=null;
    }
  });

  $("seRead").addEventListener("click", async function(){
    if(!radio) return; var S=D().set.st; $("seRead").disabled=true;
    try{
      mem=await radio.dumpEeprom(0,0x2000,function(d,t){ seBar(d,t); seProg(S.reading(d,t)); });
      dirty=new Set(); populate(); $("seWrite").disabled=false; seProg(S.readDone,"ok");
    }catch(e){ seProg(S.writeFail(e&&e.message?e.message:e),"err"); }
    $("seRead").disabled=false;
  });

  $("seWrite").addEventListener("click", async function(){
    if(!radio||!mem) return; var S=D().set.st;
    var pages=[]; dirty.forEach(function(a){ pages.push(a); }); pages.sort(function(x,y){return x-y;});
    if(pages.length===0){ seProg(S.noChanges); return; }
    $("seWrite").disabled=true;
    try{
      for(var i=0;i<pages.length;i++){
        await radio.writeCfg(pages[i], mem.slice(pages[i], pages[i]+8));
        seBar(i+1,pages.length); seProg(S.writing(i+1,pages.length));
      }
      dirty=new Set(); seProg(S.writeDone,"ok");
    }catch(e){ seProg(S.writeFail(e&&e.message?e.message:e),"err"); }
    $("seWrite").disabled=false;
  });

  $("seRestore").addEventListener("click", function(){ if(radio) $("seFile").click(); else seProg(D().set.st.connFail,"err"); });
  $("seFile").addEventListener("change", async function(){
    var f=this.files[0]; if(!f||!radio) return; var S=D().set.st;
    var buf=new Uint8Array(await f.arrayBuffer()); this.value="";
    if(buf.length<0x1E00){ seProg(S.restoreBad,"err"); return; }
    if(!confirm(S.restoreConfirm)) return;
    $("seRestore").disabled=true;
    try{
      await radio.restore(buf,0x1E00,function(d,t){ seBar(d,t); seProg(S.restoreWriting(d,t)); });
      if(mem){ mem.set(buf.slice(0,0x1E00),0); dirty=new Set(); populate(); }
      seProg(S.restoreDone,"ok");
    }catch(e){ seProg(S.writeFail(e&&e.message?e.message:e),"err"); }
    $("seRestore").disabled=false;
  });

  onLang(function(){
    seConnect.textContent = connected ? D().set.connected : D().set.connect;
    buildForm();
  });
})();

/* ======================= APRS MONITOR + CHAT ======================= */
(function(){
  var t=null, radio=null, connected=false, running=false, rxbuf="";
  var LOG_KEY="k5_aprs_log", CHAT_KEY="k5_aprs_chat", TO_KEY="k5_aprs_to";
  function load(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)); return v||d; }catch(e){ return d; } }
  function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  var logArr=load(LOG_KEY,[]), chatArr=load(CHAT_KEY,[]);
  function apSt(m,c){ var e=$("apStatus"); e.textContent=m; e.className="status "+(c||""); }
  function tm(ts){ var d=new Date(ts); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }
  function esc(s){ return (s||"").replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]; }); }

  function renderLog(){
    var el=$("apLog"); if(!el) return;
    if(!logArr.length){ el.innerHTML="<div class='empty'>"+esc(D().ap.emptyLog)+"</div>"; return; }
    var h="";
    for(var i=logArr.length-1;i>=0;i--) h+="<div class='row'><span class='tm'>"+tm(logArr[i].t)+"</span><span class='tx'>"+esc(logArr[i].text)+"</span></div>";
    el.innerHTML=h;
  }
  function renderChat(){
    var el=$("apChat"); if(!el) return;
    if(!chatArr.length){ el.innerHTML="<div class='empty'>"+esc(D().ap.emptyChat)+"</div>"; return; }
    var h="";
    chatArr.forEach(function(m){
      h+="<div class='bub "+(m.dir==="out"?"out":"in")+"'><span class='who'>"+esc(m.dir==="out"?("→ "+m.who):m.who)+"</span>"+esc(m.text)+"<span class='tm'>"+tm(m.t)+"</span></div>";
    });
    el.innerHTML=h; el.scrollTop=el.scrollHeight;
  }
  function addLog(text){ logArr.push({t:Date.now(),text:text}); if(logArr.length>500)logArr=logArr.slice(-500); save(LOG_KEY,logArr); renderLog(); }
  function addChat(dir,who,text){ chatArr.push({dir:dir,who:who,text:text,t:Date.now()}); if(chatArr.length>500)chatArr=chatArr.slice(-500); save(CHAT_KEY,chatArr); renderChat(); }

  // a decoded packet line the firmware reported (without the "APRS:" prefix).
  // Messages addressed to us come through as "CALL>text"; everything else is a
  // position/telemetry summary -> log only.
  function onLine(line){
    addLog(line);
    var gt=line.indexOf(">");
    if(gt>0){
      var from=line.slice(0,gt);
      if(/^[A-Z0-9]{1,6}(-[0-9]{1,2})?$/.test(from)) addChat("in",from,line.slice(gt+1));
    }
  }
  function extract(){
    for(;;){
      var idx=rxbuf.indexOf("APRS:");
      if(idx<0){ if(rxbuf.length>512) rxbuf=rxbuf.slice(-64); return; }
      if(idx>0) rxbuf=rxbuf.slice(idx);              // drop binary junk before the prefix
      var m=rxbuf.search(/[\r\n]/);
      if(m<0){ if(rxbuf.length>2048) rxbuf=""; return; }  // line incomplete, wait for more
      var line=rxbuf.slice(5,m).trim();
      rxbuf=rxbuf.slice(m+1);
      if(line) onLine(line);
    }
  }
  async function monLoop(){
    while(running){
      var chunk;
      try{ chunk=await t.recv(256,800); }catch(e){ break; }
      if(chunk&&chunk.length){ for(var i=0;i<chunk.length;i++) rxbuf+=String.fromCharCode(chunk[i]); extract(); }
    }
  }

  $("apConnect").addEventListener("click", async function(){
    var S=D().ap.st; if(connected) return;
    t=K5.pickTransport(); if(!t){ apSt(D().beacon.st.neither,"err"); return; }
    apSt(S.connecting);
    try{
      await t.connect(); radio=new K5.Radio(t);
      var ver=await radio.hello();
      if(!ver){ apSt(D().install.st.noAnswer,"err"); try{await t.disconnect();}catch(e){} t=null; return; }
      connected=true; apSt(S.connected(ver),"ok");
      $("apConnect").textContent=D().ap.connected; $("apConnect").classList.add("connected");
      running=true; monLoop();
    }catch(e){
      var msg=(e&&e.message)?e.message:String(e), busy=/open|in use|already|network/i.test(msg);
      apSt(busy?S.portBusy:S.connFail,"err"); try{if(t)await t.disconnect();}catch(_e){} t=null;
    }
  });

  function msgFrame(dest,text){
    var d=new Uint8Array(40);
    dest=(dest||"").toUpperCase();
    for(var i=0;i<10&&i<dest.length;i++) d[i]=dest.charCodeAt(i)&0x7F;
    for(var j=0;j<30&&j<text.length;j++) d[10+j]=text.charCodeAt(j)&0x7F;
    return K5.frameCommand(0x0700,d);
  }
  async function doSend(){
    var S=D().ap.st;
    var to=$("amTo").value.trim().toUpperCase(), text=$("amText").value;
    if(!to){ apSt(S.needTo,"err"); return; }
    if(!text.trim()){ apSt(S.needText,"err"); return; }
    if(!t||!connected){ apSt(S.connFail,"err"); return; }
    try{
      await t.send(msgFrame(to,text));
      addChat("out",to,text); save(TO_KEY,to);
      $("amText").value=""; apSt(S.sent,"ok");
    }catch(e){ apSt(S.sendFail(e&&e.message?e.message:e),"err"); }
  }
  $("amSend").addEventListener("click", doSend);
  $("amText").addEventListener("keydown", function(ev){ if(ev.key==="Enter"){ ev.preventDefault(); doSend(); } });
  $("apChatClear").addEventListener("click", function(){ if(chatArr.length && confirm(D().ap.confirmClear)){ chatArr=[]; save(CHAT_KEY,chatArr); renderChat(); } });
  $("apLogClear").addEventListener("click", function(){ if(logArr.length && confirm(D().ap.confirmClear)){ logArr=[]; save(LOG_KEY,logArr); renderLog(); } });

  var lastTo=load(TO_KEY,null); if(lastTo && typeof lastTo==="string") $("amTo").value=lastTo;

  onLang(function(){
    $("apConnect").textContent = connected ? D().ap.connected : D().ap.connect;
    $("amText").placeholder = D().ap.msgPh;
    $("amTo").placeholder = D().ap.toPh;
    renderLog(); renderChat();
  });
  renderLog(); renderChat();
})();

/* ======================= boot ======================= */
routeFromHash();
applyLang();
</script>
